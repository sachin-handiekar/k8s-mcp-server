# ===========================================
# Kubernetes MCP Server Configuration
# ===========================================

# STDIO transport for MCP protocol
spring.main.web-application-type=none
spring.main.banner-mode=off

# Suppress console logging to avoid corrupting STDIO JSON protocol
logging.pattern.console=
logging.file.name=k8s-mcp-server.log
logging.level.root=WARN
logging.level.com.k8smcp=INFO

# MCP Server identity
spring.ai.mcp.server.name=kubernetes-mcp-server
spring.ai.mcp.server.version=1.0.0

# Kubernetes MCP custom properties
k8s.mcp.non-destructive-mode=${ALLOW_ONLY_NON_DESTRUCTIVE_TOOLS:false}
k8s.mcp.secrets-masking=${MASK_SECRETS:true}
k8s.mcp.kubeconfig-path=${KUBECONFIG:}
